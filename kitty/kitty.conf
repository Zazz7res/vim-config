# 命令后面不能有注释，不然命令不会生效的
# =================================================================
# 🐧 Kitty 终端配置 - Linux 专业版 (已添加详细注释)
# =================================================================
# Kitty 会基于此字体寻找对应的粗体、斜体变体
font_family      JetBrainsMono Nerd Font 
# 设置终端默认文字大小   字体大小：单位为磅 (points)
font_size        13.0
# 当文字需要加粗时，使用此字体文件
bold_font        JetBrainsMono Nerd Font ExtraBold
# 当文字需要斜体时（如注释），使用此字体文件
italic_font      JetBrainsMono Nerd Font ExtraBold Italic
# 确保粗斜体也能正确显示倾斜效果
bold_italic_font JetBrainsMono Nerd Font ExtraBold Italic
# 作用：让 => 显示为箭头，!= 显示为不等号等，提升代码可读性  never 表示“从不禁用”
disable_ligatures never
# 次像素渲染，让字体更清晰
text_composition_strategy legacy
# =================================================================
# 高级视觉与功能增强
# =================================================================
# 监听 Unix Socket 地址，用于外部程序控制 Kitty
listen_on unix:/tmp/kitty-socket

# 调整行高为字体的 120%，增加行间距以防拥挤
adjust_line_height  120%
# 调整列宽，0 表示使用字体默认宽度
adjust_column_width 0

# 超链接下划线样式，hover 表示仅鼠标悬停时显示
underline_hyperlinks hover
# 设置光标为下划线形状时的粗细为 1.5 像素
cursor_underline_thickness 1.5


# =================================================================
# 窗口外观
# =================================================================
# 记住关闭时的窗口大小，下次启动时恢复
remember_window_size  yes
# 首次启动时的窗口宽度 (像素)
initial_window_width  1000
# 首次启动时的窗口高度 (像素)
initial_window_height 650
# 窗口内容内边距，0 表示文字紧贴边缘
window_padding_width 0
# 不隐藏系统窗口装饰 (保留标题栏和边框)
hide_window_decorations no
# 背景透明度 0.90 (90% 不透明)
background_opacity 0.90
# 背景模糊度 1 (需要系统合成器支持，如 Picom)
background_blur 1

# =================================================================
# 标签栏
# =================================================================
# 标签栏位置：顶部
tab_bar_edge top
# 标签栏样式：Powerline 风格
tab_bar_style powerline
# Powerline 分割线风格：斜切
tab_powerline_style slanted
# 标签页标题模板：显示 序号：标题
tab_title_template "{index}: {title}"
# 激活标签页的字体样式：粗体
active_tab_font_style   bold
# 未激活标签页的字体样式：正常
inactive_tab_font_style normal

# =================================================================
# 光标与鼠标
# =================================================================
# 光标形状：竖线 (Beam)，程序员常用
cursor_shape beam
# 光标闪烁间隔：0.5 秒
cursor_blink_interval 0.5
# 输入后隐藏鼠标指针的等待时间：3 秒
mouse_hide_wait 3.0
# 选中文字即自动复制到剪贴板 (无需按 Ctrl+C)
copy_on_select yes

# 双击/三击判定的时间间隔
click_interval 0.5
# 定义双击选中“单词”时包含的字符 (方便选中路径或 URL)
select_by_word_characters @-./_~?&=%+#
# 矩形选择 (列模式) 的修饰键：Ctrl+Shift
rectangle_select_modifiers ctrl+shift

# =================================================================
# 性能与系统优化
# =================================================================
# 渲染延迟 (毫秒)，越低越流畅但可能增加 CPU 占用
repaint_delay 8
# 输入延迟 (毫秒)
input_delay 2
# 刷新率与显示器同步，防止画面撕裂
sync_to_monitor yes

# 滚动回溯缓冲区行数：10000 行
scrollback_lines 10000
# 查看历史输出时使用的分页器命令 (less 配合参数保留颜色)
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
# 鼠标滚轮滚动速度倍率
wheel_scroll_multiplier 5.0
# 如果使用触控屏或者触控板
touch_scroll_multiplier 4.0
# 窗口变大时，尝试用历史内容填充空白区域
scrollback_fill_enlarged_window yes

# =================================================================
# 🔥 快捷键映射（Linux 专属）
# =================================================================
# 定义 Kitty 的主修饰键为 Ctrl+Shift (后续 map 中的 kitty_mod 即代表此组合)
kitty_mod ctrl+shift

# 复制粘贴（标准 Linux 风格，避免与程序内快捷键冲突）
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard


# =================================================================
# 🚀 最终进化版：Splits 布局完美配置
# =================================================================

# 1. 基础分割 (保持不变，非常棒)
enabled_layouts splits,stack,tall,fat
map kitty_mod+l launch --location=vsplit --cwd=current
map kitty_mod+h launch --location=hsplit --cwd=current

# 2. 窗口焦点跳转 (用 Ctrl+Shift + 方向键)
# 这样你可以快速在各个分割出的窗口间切换
map kitty_mod+left  neighboring_window left
map kitty_mod+right neighboring_window right
map kitty_mod+up    neighboring_window up
map kitty_mod+down  neighboring_window down

# 3. 窗口大小缩放 (改用 Ctrl+Alt + 方向键)
# 避开 Ctrl+Shift，防止和上面的跳转冲突
map ctrl+alt+left  resize_window narrower 3
map ctrl+alt+right resize_window wider 3
map ctrl+alt+up    resize_window taller 3
map ctrl+alt+down  resize_window shorter 3

# 4. 窗口位置大挪移 (保持你的 Ctrl+Shift+Alt 方案，很合理)
map ctrl+shift+alt+up    layout_action move_to_screen_edge top
map ctrl+shift+alt+left  layout_action move_to_screen_edge left
map ctrl+shift+alt+right layout_action move_to_screen_edge right
map ctrl+shift+alt+down  layout_action move_to_screen_edge bottom

# 5. 一键平分窗口
map ctrl+alt+r resize_window reset



# ✅ 标签页管理
# 切换到下一个标签页
map ctrl+tab next_tab
# 切换到上一个标签页
map ctrl+shift+tab previous_tab
# 新建空白标签页
map ctrl+shift+t new_tab_with_cwd

# 快速跳转标签（数字键 1-5）
map kitty_mod+1 goto_tab 1
map kitty_mod+2 goto_tab 2
map kitty_mod+3 goto_tab 3
map kitty_mod+4 goto_tab 4
map kitty_mod+5 goto_tab 5
# 跳转到上一个标签 (⚠️ 注意：goto_tab previous 可能无效，建议改为 goto_tab -1 或 last_tab)
map kitty_mod+0 goto_tab -1  

# 布局管理
# 切换到下一个布局
map kitty_mod+g next_layout
# 切换到上一个布局
map kitty_mod+shift+g previous_layout
# 切换为 Stack 布局 (类似 Tab 堆叠)
map kitty_mod+f toggle_layout stack

# 实用功能
# 显示滚动回溯 (查看历史输出)
map kitty_mod+u show_scrollback
# 切换全屏模式
map kitty_mod+enter toggle_fullscreen
# 编辑配置文件
map kitty_mod+e edit_config_file
# 重载配置文件 (修改后无需重启)
map kitty_mod+r load_config_file

# 字体大小调整
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# =================================================================
# Shell 集成与高级功能
# =================================================================
# 指定 Shell
shell /usr/bin/bash
# 禁用系统音频铃铛 (配合视觉铃铛使用)
enable_audio_bell no
# 启用 Shell 集成，但禁用自动标题和自动光标控制
shell_integration enabled no-title no-cursor
# 允许终端内显示超链接
allow_hyperlinks yes
# 设置 TERM 环境变量，确保程序识别 Kitty 特性
term xterm-kitty
# 允许远程控制，限制为仅 Socket 方式 (⚠️ 注意：此设置会覆盖第 13 行的 yes，更安全)
allow_remote_control socket-only

# =================================================================
# 实用扩展功能
# =================================================================
# 自动检测并高亮 URL
detect_urls yes
# 鼠标悬停链接时显示目标地址
show_hyperlink_targets yes
# 视觉铃铛持续时间 (⚠️ 注意：此处的 0.1 会覆盖第 22 行的 0.2，最终生效 0.1)
visual_bell_duration 0.1
# 视觉铃铛颜色 (黄色)
visual_bell_color #f1fa8c

# =================================================================
# 🚀 私人推荐配置（已测试可用）
# =================================================================
# 打开 Nautilus 文件管理器 (当前目录)
map kitty_mod+o launch --type=overlay --cwd=current nautilus .
# 设置窗口标题
map kitty_mod+m set_window_title
# 切换回上一个使用的窗口
map kitty_mod+` last_used_window

# 关闭当前窗口
map kitty_mod+w close_window
# 关闭当前标签页
map kitty_mod+q close_tab

