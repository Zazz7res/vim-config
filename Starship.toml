#Starship 是一个用 Rust 编写的轻量级、极速、高度可定制的终端提示符，支持所有主流 shell（bash、zsh、fish、powershell 等）。它开箱即用，自动显示 git 分支、命令执行时间、编程语言版本等信息，并且完美支持 Nerd Font 图标，让你轻松拥有美观实用的命令行提示符。
# nano ~/.config/starship.toml
# DeepSeek  优化方案：Catppuccin Mocha 精调版（保持柔和，加强对比）
# 主色盘：深蓝（用于用户名）、浅蓝（目录）、桃色（git）、紫色（语言）、绿色（时间）
# 文字统一使用 #1e1e2e (Catppuccin 的 crust 色)，背景色块使用柔和色调

format = """
[](#89b4fa)\
[  ](fg:#1e1e2e bg:#89b4fa)\
[](fg:#89b4fa bg:#a6e3a1)\
$directory\
[](fg:#a6e3a1 bg:#f9e2af)\
$git_branch\
$git_status\
[](fg:#f9e2af bg:#cba6f7)\
$c\
$nodejs\
$rust\
[](fg:#cba6f7 bg:#94e2d5)\
$time\
[](fg:#94e2d5)\
"""

[directory]
style = "fg:#1e1e2e bg:#a6e3a1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "fg:#1e1e2e bg:#f9e2af"
format = '[[ $symbol $branch ](fg:#1e1e2e bg:#f9e2af)]($style)'

[git_status]
style = "fg:#1e1e2e bg:#f9e2af"
format = '[[($all_status$ahead_behind )](fg:#1e1e2e bg:#f9e2af)]($style)'

[c]
symbol = "  "
style = "fg:#1e1e2e bg:#cba6f7"
format = '[[ $symbol($version) ](fg:#1e1e2e bg:#cba6f7)]($style)'

[nodejs]
symbol = " "
style = "fg:#1e1e2e bg:#cba6f7"
format = '[[ $symbol($version) ](fg:#1e1e2e bg:#cba6f7)]($style)'

[rust]
symbol = " "
style = "fg:#1e1e2e bg:#cba6f7"
format = '[[ $symbol($version) ](fg:#1e1e2e bg:#cba6f7)]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#1e1e2e bg:#94e2d5"
format = '[[  $time ](fg:#1e1e2e bg:#94e2d5)]($style)'
